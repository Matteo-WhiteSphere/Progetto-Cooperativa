<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coop - Supermercato</title>
    <link rel="stylesheet" href="libreria.css">
    <style>
        /* Coop-specific styles */
        .coop-header {
            background-color: #e31837;
            padding: 15px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        .coop-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }
        .coop-logo img {
            height: 40px;
        }
        .coop-logo span {
            font-size: 20px;
            font-weight: 600;
        }
        .coop-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .coop-cart-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: background 0.3s;
        }
        .coop-cart-link:hover {
            background: rgba(255,255,255,0.3);
        }
        .coop-account-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .coop-account-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .coop-main {
            padding-top: 80px;
            display: flex;
            min-height: 100vh;
        }
        .coop-sidebar {
            width: 250px;
            background: var(--bg3);
            padding: 30px 20px;
            border-right: 1px solid var(--border);
        }
        .coop-sidebar h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 20px;
        }
        .coop-category {
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text2);
            margin-bottom: 8px;
        }
        .coop-category:hover {
            background: var(--glass-bg);
            color: var(--text);
        }
        .coop-category.active {
            background: var(--accent);
            color: white;
        }
        .coop-content {
            flex: 1;
            padding: 30px 44px;
        }
        .coop-content h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 24px;
        }
        /* Override kit-card for Coop */
        .kit-card .kit-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .kit-card .btn-get {
            background: #e31837;
            color: white;
        }
        .kit-card .btn-get:hover {
            background: #c41530;
        }
        /* Modal account */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.52);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s var(--ease);
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .modal-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(48px);
            -webkit-backdrop-filter: blur(48px);
            border-radius: 28px;
            padding: 44px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .modal-box h3 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        .modal-box > p {
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 26px;
        }
    </style>
</head>
<body>
    <!-- Barra superiore -->
    <div class="coop-header">
        <a href="home.html" class="coop-logo">
            <img src="img/Coop.png" alt="Coop Logo">
            <span>Coop</span>
        </a>
        <div class="coop-nav">
            <a href="carrello.html" class="coop-cart-link">
                <span>🛒</span>
                <span id="cart-total">€0.00</span>
            </a>
            <button class="coop-account-btn" onclick="showAccountModal()">
                <span>👤</span>
                <span>Account</span>
            </button>
        </div>
    </div>

    <!-- Layout principale -->
    <div class="coop-main">
        <!-- Barra laterale -->
        <div class="coop-sidebar">
            <h2>Categorie</h2>
            <div class="coop-category active" onclick="selectCategory(this, 'alimentari')">
                <span>🍎</span>
                <span>Reparto Alimentari</span>
            </div>
            <div class="coop-category" onclick="selectCategory(this, 'abbigliamento')">
                <span>👕</span>
                <span>Reparto Abbigliamento</span>
            </div>
            <div class="coop-category" onclick="selectCategory(this, 'casalinghi')">
                <span>🏠</span>
                <span>Reparto Casalinghi</span>
            </div>
            <div class="coop-category" onclick="selectCategory(this, 'panificio')">
                <span>🍞</span>
                <span>Reparto Panificio</span>
            </div>
            <div class="coop-category" onclick="selectCategory(this, 'surgelati')">
                <span>❄️</span>
                <span>Reparto Surgelati</span>
            </div>
        </div>

        <!-- Contenuto principale -->
        <div class="coop-content">
            <h1 id="category-title">Reparto Alimentari</h1>
            <div class="shop-panel active" id="panel-kit">
                <div class="kit-grid" id="products-grid">
                    <!-- I prodotti verranno caricati qui -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Account -->
    <div class="modal-overlay" id="account-modal">
        <div class="modal-box">
            <h3>Accedi al tuo account</h3>
            <p>Inserisci le tue credenziali per accedere</p>
            <div class="fgroup">
                <label class="flabel">Email</label>
                <input type="email" class="finput" placeholder="Inserisci la tua email">
            </div>
            <div class="fgroup">
                <label class="flabel">Password</label>
                <input type="password" class="finput" placeholder="Inserisci la tua password">
            </div>
            <button class="btn-submit" onclick="login()">Accedi</button>
            <button class="btn-close" onclick="closeAccountModal()">Chiudi</button>
        </div>
    </div>

    <script>
        // Dati del carrello
        let cartTotal = 0;
        let cartItems = [];

        // Dati dei prodotti per categoria
        const products = {
            alimentari: [
                { name: "Pasta Barilla", price: 1.29, icon: "🍝" },
                { name: "Sugo Pomodoro", price: 2.50, icon: "🥫" },
                { name: "Olio d'Oliva", price: 8.99, icon: "🫒" },
                { name: "Riso Arborio", price: 3.20, icon: "🍚" },
                { name: "Tonno in scatola", price: 4.50, icon: "🐟" },
                { name: "Passata di pomodoro", price: 1.80, icon: "🍅" }
            ],
            abbigliamento: [
                { name: "T-shirt Coop", price: 15.99, icon: "👕" },
                { name: "Maglione Invernale", price: 29.99, icon: "🧥" },
                { name: "Pantaloni Jeans", price: 45.00, icon: "👖" },
                { name: "Scarpe Sportive", price: 59.99, icon: "👟" },
                { name: "Cappello", price: 12.50, icon: "🧢" },
                { name: "Sciarpa", price: 18.00, icon: "🧣" }
            ],
            casalinghi: [
                { name: "Detersivo Piatti", price: 3.50, icon: "🧴" },
                { name: "Spugne", price: 2.99, icon: "🧽" },
                { name: "Sacchi Immondizia", price: 5.00, icon: "🗑️" },
                { name: "Detersivo Lavatrice", price: 8.50, icon: "🧺" },
                { name: "Panni Microfibra", price: 6.99, icon: "🧹" },
                { name: "Ammoniaca", price: 2.50, icon: "🧪" }
            ],
            panificio: [
                { name: "Pane Casereccio", price: 2.50, icon: "🍞" },
                { name: "Focaccia", price: 3.00, icon: "🫓" },
                { name: "Pizza Margherita", price: 5.50, icon: "🍕" },
                { name: "Grissini", price: 1.80, icon: "🥖" },
                { name: "Torta della Nonna", price: 12.00, icon: "🥧" },
                { name: "Cornetti", price: 4.50, icon: "🥐" }
            ],
            surgelati: [
                { name: "Piselli Surgelati", price: 2.00, icon: "🟢" },
                { name: "Patatine Fritte", price: 3.50, icon: "🍟" },
                { name: "Gelato Vaniglia", price: 5.99, icon: "🍦" },
                { name: "Pizza Surgelata", price: 4.50, icon: "🍕" },
                { name: "Pollo Surgelato", price: 7.50, icon: "🍗" },
                { name: "Verdure Miste", price: 3.00, icon: "🥦" }
            ]
        };

        // Carica i prodotti iniziali
        function loadProducts(category) {
            const grid = document.getElementById('products-grid');
            const title = document.getElementById('category-title');
            
            const categoryNames = {
                alimentari: 'Reparto Alimentari',
                abbigliamento: 'Reparto Abbigliamento',
                casalinghi: 'Reparto Casalinghi',
                panificio: 'Reparto Panificio',
                surgelati: 'Reparto Surgelati'
            };
            
            title.textContent = categoryNames[category];
            grid.innerHTML = '';
            
            products[category].forEach(product => {
                const card = document.createElement('div');
                card.className = 'kit-card';
                card.innerHTML = `
                    <div class="kit-icon">${product.icon}</div>
                    <div class="kit-name">${product.name}</div>
                    <div class="kit-desc">Prodotto di qualità Coop</div>
                    <div class="kit-footer">
                        <div>
                            <span class="kit-price">€${product.price.toFixed(2)}</span>
                        </div>
                        <button class="btn-get" onclick="addToCart('${product.name}', ${product.price}, '${product.icon}')">Aggiungi</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Seleziona categoria
        function selectCategory(element, category) {
            // Rimuovi classe active da tutte le categorie
            document.querySelectorAll('.coop-category').forEach(cat => {
                cat.classList.remove('active');
            });
            // Aggiungi classe active alla categoria selezionata
            element.classList.add('active');
            // Carica prodotti della categoria
            loadProducts(category);
        }

        // Aggiungi al carrello
        function addToCart(name, price, icon) {
            cartTotal += price;
            cartItems.push({ name, price, icon });
            // Salva nel localStorage
            localStorage.setItem('cartItems', JSON.stringify(cartItems));
            localStorage.setItem('cartTotal', cartTotal.toString());
            updateCartDisplay();
            alert(`${name} aggiunto al carrello!`);
        }

        // Aggiorna display carrello
        function updateCartDisplay() {
            document.getElementById('cart-total').textContent = `€${cartTotal.toFixed(2)}`;
        }

        // Mostra modal account
        function showAccountModal() {
            document.getElementById('account-modal').classList.add('open');
        }

        // Chiudi modal account
        function closeAccountModal() {
            document.getElementById('account-modal').classList.remove('open');
        }

        // Login finto
        function login() {
            alert('Accesso effettuato con successo! (Simulazione)');
            closeAccountModal();
        }

        // Carica carrello dal localStorage
        function loadCartFromStorage() {
            const savedItems = localStorage.getItem('cartItems');
            const savedTotal = localStorage.getItem('cartTotal');
            if (savedItems) {
                cartItems = JSON.parse(savedItems);
            }
            if (savedTotal) {
                cartTotal = parseFloat(savedTotal);
            }
            updateCartDisplay();
        }

        // Carica prodotti iniziali
        loadProducts('alimentari');
        loadCartFromStorage();
    </script>
</body>
</html>
