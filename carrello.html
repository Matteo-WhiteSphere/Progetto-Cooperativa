<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrello - Coop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cartheader {
            background: var(--header-bg);
            backdrop-filter: saturate(180%) blur(24px);
            -webkit-backdrop-filter: saturate(180%) blur(24px);
            border-bottom: 0.5px solid var(--border);
            padding: 15px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        .cartlogo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }
        .cartlogo img {
            height: 40px;
        }
        .cartlogo span {
            font-size: 18px;
            font-weight: 600;
        }
        .cartmain {
            padding-top: 80px;
            max-width: 1080px;
            margin: 0 auto;
            padding: 100px 44px;
        }
        .carttitle {
            font-size: clamp(34px, 5.5vw, 56px);
            font-weight: 700;
            line-height: 1.06;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 18px;
        }
        .cartitems {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }
        .cartitem {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
        }
        .cartitem:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .cartiteminfo {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .cartitemicon {
            font-size: 40px;
        }
        .cartitemname {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
        }
        .cartitemprice {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }
        .cartitemremove {
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            color: #e31837;
            background: rgba(227, 24, 55, 0.10);
            border: none;
            padding: 7px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .cartitemremove:hover {
            background: rgba(227, 24, 55, 0.20);
        }
        .cartsummary {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px;
            max-width: 400px;
            margin-left: auto;
        }
        .cartsummarytitle {
            font-size: 19px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 20px;
        }
        .cartsummaryrow {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
            color: var(--text2);
        }
        .cartsummarytotal {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }
        .btncheckout {
            width: 100%;
            font-family: var(--font);
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            background: #e31837;
            border: none;
            border-radius: 32px;
            padding: 14px;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btncheckout:hover {
            opacity: 0.85;
            transform: scale(0.99);
        }
        .btnback {
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            background: transparent;
            border: 1px solid var(--border);
            padding: 10px 26px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btnback:hover {
            background: var(--glass-bg);
        }
        .emptycart {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }
        .emptycarticon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .emptycart h3 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="cartheader">
        <a href="home.html" class="cartlogo">
            <img src="img/Coop.png" alt="Coop Logo">
            <span>Shop</span>
        </a>
        <a href="home.html" class="btnback">Torna alla Home</a>
    </div>

    <div class="cartmain">
        <h1 class="carttitle">Il tuo carrello</h1>
        
        <div id="cart-content">
            <div class="cartitems" id="cart-items">
                <!-- Gli elementi del carrello verranno caricati qui -->
            </div>
            
            <div class="cartsummary" id="cart-summary">
                <h3 class="cartsummarytitle">Riepilogo</h3>
                <div class="cartsummaryrow">
                    <span>Subtotale</span>
                    <span id="subtotal">€0.00</span>
                </div>
                <div class="cartsummaryrow">
                    <span>Spedizione</span>
                    <span>Gratuita</span>
                </div>
                <div class="cartsummarytotal">
                    <span>Totale</span>
                    <span id="total">€0.00</span>
                </div>
                <button class="btncheckout" onclick="checkout()">Procedi al checkout</button>
            </div>
        </div>

        <div class="emptycart" id="empty-cart" style="display: none;">
            <div class="emptycarticon">🛒</div>
            <h3>Il tuo carrello è vuoto</h3>
            <p>Aggiungi alcuni prodotti per continuare</p>
            <a href="home.html" class="btnback" style="margin-top: 20px; display: inline-block;">Torna allo shop</a>
        </div>
    </div>

    <script>
        // Recupera i dati del carrello dal localStorage
        let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
        let cartTotal = parseFloat(localStorage.getItem('cartTotal')) || 0;

        function renderCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartSummary = document.getElementById('cart-summary');
            const emptyCart = document.getElementById('empty-cart');
            const subtotalEl = document.getElementById('subtotal');
            const totalEl = document.getElementById('total');

            if (cartItems.length === 0) {
                cartItemsContainer.style.display = 'none';
                cartSummary.style.display = 'none';
                emptyCart.style.display = 'block';
                return;
            }

            cartItemsContainer.style.display = 'flex';
            cartSummary.style.display = 'block';
            emptyCart.style.display = 'none';

            cartItemsContainer.innerHTML = '';
            
            cartItems.forEach((item, index) => {
                const cartItem = document.createElement('div');
                cartItem.className = 'cartitem';
                cartItem.innerHTML = `
                    <div class="cartiteminfo">
                        <div class="cartitemicon">${item.icon}</div>
                        <div class="cartitemname">${item.name}</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div class="cartitemprice">€${item.price.toFixed(2)}</div>
                        <button class="cartitemremove" onclick="removeFromCart(${index})">Rimuovi</button>
                    </div>
                `;
                cartItemsContainer.appendChild(cartItem);
            });

            subtotalEl.textContent = `€${cartTotal.toFixed(2)}`;
            totalEl.textContent = `€${cartTotal.toFixed(2)}`;
        }

        function removeFromCart(index) {
            cartTotal -= cartItems[index].price;
            cartItems.splice(index, 1);
            
            localStorage.setItem('cartItems', JSON.stringify(cartItems));
            localStorage.setItem('cartTotal', cartTotal.toString());
            
            renderCart();
        }

        function checkout() {
            if (cartItems.length === 0) {
                alert('Il carrello è vuoto!');
                return;
            }
            alert('Grazie per il tuo ordine! Totale: €' + cartTotal.toFixed(2));
            // Svuota il carrello dopo il checkout
            cartItems = [];
            cartTotal = 0;
            localStorage.setItem('cartItems', JSON.stringify(cartItems));
            localStorage.setItem('cartTotal', '0');
            renderCart();
        }

        // Carica il carrello all'avvio
        renderCart();
    </script>
</body>
</html>
