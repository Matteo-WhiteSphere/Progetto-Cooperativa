<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrello - Coop</title>
    <link rel="stylesheet" href="libreria.css">
    <style>
        .cart-header {
            background: var(--header-bg);
            backdrop-filter: saturate(180%) blur(24px);
            -webkit-backdrop-filter: saturate(180%) blur(24px);
            border-bottom: 0.5px solid var(--border);
            padding: 15px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        .cart-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }
        .cart-logo img {
            height: 40px;
        }
        .cart-logo span {
            font-size: 18px;
            font-weight: 600;
        }
        .cart-main {
            padding-top: 80px;
            max-width: 1080px;
            margin: 0 auto;
            padding: 100px 44px;
        }
        .cart-title {
            font-size: clamp(34px, 5.5vw, 56px);
            font-weight: 700;
            line-height: 1.06;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 18px;
        }
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }
        .cart-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
        }
        .cart-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .cart-item-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .cart-item-icon {
            font-size: 40px;
        }
        .cart-item-name {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
        }
        .cart-item-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }
        .cart-item-remove {
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            color: #e31837;
            background: rgba(227, 24, 55, 0.10);
            border: none;
            padding: 7px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .cart-item-remove:hover {
            background: rgba(227, 24, 55, 0.20);
        }
        .cart-summary {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 32px;
            max-width: 400px;
            margin-left: auto;
        }
        .cart-summary-title {
            font-size: 19px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 20px;
        }
        .cart-summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
            color: var(--text2);
        }
        .cart-summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }
        .btn-checkout {
            width: 100%;
            font-family: var(--font);
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            background: #e31837;
            border: none;
            border-radius: 32px;
            padding: 14px;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-checkout:hover {
            opacity: 0.85;
            transform: scale(0.99);
        }
        .btn-back {
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            background: transparent;
            border: 1px solid var(--border);
            padding: 10px 26px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-back:hover {
            background: var(--glass-bg);
        }
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }
        .empty-cart-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .empty-cart h3 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="cart-header">
        <a href="home.html" class="cart-logo">
            <img src="img/Coop.png" alt="Coop Logo">
            <span>Coop</span>
        </a>
        <a href="home.html" class="btn-back">Torna alla Home</a>
    </div>

    <div class="cart-main">
        <h1 class="cart-title">Il tuo carrello</h1>
        
        <div id="cart-content">
            <div class="cart-items" id="cart-items">
                <!-- Gli elementi del carrello verranno caricati qui -->
            </div>
            
            <div class="cart-summary" id="cart-summary">
                <h3 class="cart-summary-title">Riepilogo</h3>
                <div class="cart-summary-row">
                    <span>Subtotale</span>
                    <span id="subtotal">€0.00</span>
                </div>
                <div class="cart-summary-row">
                    <span>Spedizione</span>
                    <span>Gratuita</span>
                </div>
                <div class="cart-summary-total">
                    <span>Totale</span>
                    <span id="total">€0.00</span>
                </div>
                <button class="btn-checkout" onclick="checkout()">Procedi al checkout</button>
            </div>
        </div>

        <div class="empty-cart" id="empty-cart" style="display: none;">
            <div class="empty-cart-icon">🛒</div>
            <h3>Il tuo carrello è vuoto</h3>
            <p>Aggiungi alcuni prodotti per continuare</p>
            <a href="home.html" class="btn-back" style="margin-top: 20px; display: inline-block;">Torna allo shop</a>
        </div>
    </div>

    <script>
        // Recupera i dati del carrello dal localStorage
        let cartItems = JSON.parse(localStorage.getItem('cartItems')) || [];
        let cartTotal = parseFloat(localStorage.getItem('cartTotal')) || 0;

        function renderCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartSummary = document.getElementById('cart-summary');
            const emptyCart = document.getElementById('empty-cart');
            const subtotalEl = document.getElementById('subtotal');
            const totalEl = document.getElementById('total');

            if (cartItems.length === 0) {
                cartItemsContainer.style.display = 'none';
                cartSummary.style.display = 'none';
                emptyCart.style.display = 'block';
                return;
            }

            cartItemsContainer.style.display = 'flex';
            cartSummary.style.display = 'block';
            emptyCart.style.display = 'none';

            cartItemsContainer.innerHTML = '';
            
            cartItems.forEach((item, index) => {
                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';
                cartItem.innerHTML = `
                    <div class="cart-item-info">
                        <div class="cart-item-icon">${item.icon}</div>
                        <div class="cart-item-name">${item.name}</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div class="cart-item-price">€${item.price.toFixed(2)}</div>
                        <button class="cart-item-remove" onclick="removeFromCart(${index})">Rimuovi</button>
                    </div>
                `;
                cartItemsContainer.appendChild(cartItem);
            });

            subtotalEl.textContent = `€${cartTotal.toFixed(2)}`;
            totalEl.textContent = `€${cartTotal.toFixed(2)}`;
        }

        function removeFromCart(index) {
            cartTotal -= cartItems[index].price;
            cartItems.splice(index, 1);
            
            localStorage.setItem('cartItems', JSON.stringify(cartItems));
            localStorage.setItem('cartTotal', cartTotal.toString());
            
            renderCart();
        }

        function checkout() {
            if (cartItems.length === 0) {
                alert('Il carrello è vuoto!');
                return;
            }
            alert('Grazie per il tuo ordine! Totale: €' + cartTotal.toFixed(2));
            // Svuota il carrello dopo il checkout
            cartItems = [];
            cartTotal = 0;
            localStorage.setItem('cartItems', JSON.stringify(cartItems));
            localStorage.setItem('cartTotal', '0');
            renderCart();
        }

        // Carica il carrello all'avvio
        renderCart();
    </script>
</body>
</html>
